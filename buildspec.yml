version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "ap-southeast-4"
    REMOTE_STATE_BUCKET: "jch254-terraform-remote-state"
    TF_STATE_KEY: "audio-insights"
    APP_HOSTNAME: "audio-insights.603.nz"
    SPOTIFY_CALLBACK_URI: "https://audio-insights.603.nz/spotifylogincallback"
    SPOTIFY_SCOPES: "user-top-read playlist-modify-private"
  parameter-store:
    CLOUDFLARE_API_TOKEN: "/audio-insights/cloudflare-api-token"
    SPOTIFY_CLIENT_ID: "/audio-insights/spotify-client-id"
    GA_ID: "/audio-insights/ga-id"

phases:
  install:
    commands:
      - echo Setting up Terraform plugin cache...
      - export TF_PLUGIN_CACHE_DIR="$HOME/.terraform.d/plugin-cache"
      - mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - find ./infrastructure -name "*.bash" -exec chmod +x {} \;
      - echo Installing Node dependencies...
      - corepack enable
      - corepack prepare pnpm@9.15.9 --activate
      - pnpm config set store-dir /root/.pnpm-store
      - pnpm install --frozen-lockfile

  pre_build:
    commands:
      - echo Verifying required parameters...
      - 'test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN is required"; exit 1; }'
      - 'test -n "$SPOTIFY_CLIENT_ID" || { echo "SPOTIFY_CLIENT_ID is required"; exit 1; }'
      - 'test -n "$GA_ID" || { echo "GA_ID is required"; exit 1; }'

  build:
    on-failure: ABORT
    commands:
      - echo Deploying infrastructure...
      - ./infrastructure/deploy-infrastructure.bash
      - echo Building application bundle...
      - pnpm run build
      - test -s dist/index.html || { echo "Build did not produce dist/index.html"; exit 1; }

  post_build:
    commands:
      - echo Publishing build artifacts...
      - ./infrastructure/deploy-artifacts.bash

cache:
  paths:
    - "/root/.terraform.d/plugin-cache/**/*"
    - "/root/.pnpm-store/**/*"
